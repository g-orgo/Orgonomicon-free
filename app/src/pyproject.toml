[project]
name = "orgonomicon"
version = "0.1.0"
description = "Orgonomicon developer AI agent Ã¢â‚¬â€ routes, tools, and CLI"
requires-python = ">=3.11"
dependencies = [
    "prompt-toolkit>=3.0",
    "rich>=13.0",
    "requests>=2.28",
    "httpx>=0.27",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "pyfiglet>=1.0",
    "duckduckgo-search>=7.0",
    "reportlab>=4.0.0",
